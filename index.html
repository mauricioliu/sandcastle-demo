<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Tic-Tac-Toe</h1>
      <p class="status" data-testid="status">X's turn</p>
      <div class="board" data-testid="board" role="grid" aria-label="Tic-Tac-Toe board">
        <button class="cell" data-index="0" aria-label="Square 1"></button>
        <button class="cell" data-index="1" aria-label="Square 2"></button>
        <button class="cell" data-index="2" aria-label="Square 3"></button>
        <button class="cell" data-index="3" aria-label="Square 4"></button>
        <button class="cell" data-index="4" aria-label="Square 5"></button>
        <button class="cell" data-index="5" aria-label="Square 6"></button>
        <button class="cell" data-index="6" aria-label="Square 7"></button>
        <button class="cell" data-index="7" aria-label="Square 8"></button>
        <button class="cell" data-index="8" aria-label="Square 9"></button>
      </div>
      <button class="reset" data-testid="reset">Reset</button>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
